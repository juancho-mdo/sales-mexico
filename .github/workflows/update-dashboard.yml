name: Update Q2 Dashboard

on:
  # Runs every day at 8:00 AM Mexico City time (= 13:00 UTC, UTC-5 in CDT)
  schedule:
    - cron: '0 13 * * *'

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate dashboard
        env:
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
        run: python update_dashboard.py

      - name: Commit and push updated dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "No changes to index.html — skipping commit"
          else
            git commit -m "chore: auto-update dashboard $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
